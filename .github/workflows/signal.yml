name: Signal Collector

permissions:
  contents: write

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  collect-signals:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run signal collector
        run: python scripts/signal_collector.py

      - name: Commit report
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add reports/latest_report.txt
          git commit -m "update signal report" || echo "No changes"
          git push
